services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: reg_pay
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/reg_pay"
      JWT_ACCESS_SECRET: "your_secret_here"
      JWT_REFRESH_SECRET: "your_refresh_secret_here"
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
    depends_on:
      - backend

volumes:
  db_data:
